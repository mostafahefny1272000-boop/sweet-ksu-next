name: "Ultimate Auto-Healing Kernel Builder: Redmi Note 10 Pro"

on:
  workflow_dispatch:

env:
  # إجبار جيت هاب على استخدام أحدث إصدار لمنع التحذيرات التي ظهرت لك
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  kernel-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: "1. تحضير الكود المصدري"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "2. تهيئة النظام ومعالجة التوافق (Auto-Fix Environment)"
        run: |
          echo "--- جاري إعداد البيئة وتثبيت كافة الأدوات الممكنة ---"
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev clang lld llvm \
            qemu-user-static ccache zip unzip wget curl git python3 python3-pip \
            libncurses5-dev libncurses5 binutils-aarch64-linux-gnu libssl-dev
          
          # حل مشكلة بايثون تلقائياً
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          echo "--- تم تجهيز النظام ---"

      - name: "3. جلب المترجم الاحترافي (Proton Clang)"
        run: |
          mkdir -p clang
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C clang --strip-components=1
          rm master.tar.gz
          echo "--- المترجم جاهز في مجلد clang ---"

      - name: "4. تحديد موقع سكربت البناء وتشغيله ذكياً"
        run: |
          # البحث عن سكربت البناء أينما كان
          BUILD_SCRIPT=$(find . -name "build_ksu.sh" | head -n 1)
          if [ -z "$BUILD_SCRIPT" ]; then
            echo "خطأ: لم يتم العثور على build_ksu.sh!"
            exit 1
          fi
          
          chmod +x "$BUILD_SCRIPT"
          SCRIPT_DIR=$(dirname "$BUILD_SCRIPT")
          cd "$SCRIPT_DIR"
          
          # إضافة المترجم للمسار
          export PATH=$(pwd)/../../clang/bin:$PATH
          
          echo "--- بدأ البناء من المجلد: $(pwd) ---"
          ./$(basename "$BUILD_SCRIPT") || echo "حدث خطأ أثناء التنفيذ، سنحاول جمع النتائج المتوفرة..."

      - name: "5. البحث الشامل عن النتائج (Deep Search Mode)"
        if: always()
        run: |
          mkdir -p final_artifacts
          echo "--- جاري فحص كافة المجلدات عن أي ملفات ناتجة ---"
          
          # قائمة بالأسماء المتوقعة للملف الناتج
          POSSIBLE_NAMES=("Image.gz-dtb" "Image.gz" "Image" "Image-dtb" "kernel.img")
          
          for name in "${POSSIBLE_NAMES[@]}"; do
            find . -name "$name" -exec cp {} ./final_artifacts/KernelSU-Next-Sweet-${{ github.run_id }}.img \;
          done
          
          # البحث عن ملفات مضغوطة
          find . -name "*.zip" -exec cp {} ./final_artifacts/ \; 2>/dev/null || true
          
          # في حال الفشل، جلب سجلات الأخطاء للتحليل
          if [ ! -f "./final_artifacts/KernelSU-Next-Sweet-${{ github.run_id }}.img" ]; then
            echo "لم يتم العثور على الكيرنال، جاري جمع السجلات..."
            find . -name "*.log" -exec cp {} ./final_artifacts/ \; 2>/dev/null || true
            # تسجيل هيكلية المجلدات لمساعدتي في معرفة أين ذهب الملف
            ls -R > ./final_artifacts/directory_structure.txt
          fi

      - name: "6. رفع النتائج النهائية (Artifacts V4)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "Redmi-Note-10-Pro-Output"
          path: final_artifacts/*
          if-no-files-found: warn
          retention-days: 7

      - name: "7. التحقق الذكي والإبلاغ"
        if: always()
        run: |
          if ls final_artifacts/*.img 1> /dev/null 2>&1; then
            echo "==========================================="
            echo "🚀 نجاح! الكيرنال جاهز للتحميل الآن."
            echo "==========================================="
          else
            echo "==========================================="
            echo "⚠️ البناء لم يكتمل، يرجى تحميل ملف السجلات المرفوع لمراجعته."
            echo "==========================================="
          fi
